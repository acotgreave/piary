<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piary — Pi Art</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a { color: #5090cc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header .wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .back-link {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, #4bbfc8 0%, #a890d0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    /* ── TOGGLE ── */
    .toggle-group {
      display: flex;
      background: #f0f2f5;
      padding: 4px;
      border-radius: 10px;
      gap: 3px;
    }

    .toggle-btn {
      padding: 8px 22px;
      border: none;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.13);
    }

    /* ── MAIN ── */
    main { padding: 28px 0 60px; }

    .caption {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── CANVAS WRAPPER ── */
    .canvas-outer {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .canvas-outer.grid-mode {
      overflow: visible;
    }

    .canvas-outer.web-mode {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0d0d1a;
    }

    #artCanvas { display: block; cursor: crosshair; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── TOOLTIP ── */
    .art-tooltip {
      position: fixed;
      background: rgba(13,13,26,0.92);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.6;
      pointer-events: none;
      z-index: 200;
      display: none;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <a href="index.html" class="back-link">← Piary</a>
    <span class="page-title">Pi Art</span>
    <div class="toggle-group">
      <button id="btnGrid" class="toggle-btn active" onclick="switchView('grid')">Digit Grid</button>
      <button id="btnWeb"  class="toggle-btn"        onclick="switchView('web')">Connection Web</button>
    </div>
  </div>
</header>

<main>
<div class="wrap">
  <p class="caption" id="caption"></p>
  <div class="legend" id="legend"></div>
  <div class="canvas-outer grid-mode" id="canvasOuter">
    <canvas id="artCanvas"></canvas>
  </div>
</div>
</main>

<div class="art-tooltip" id="tooltip"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const PI_STRING = "31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989380952572010654858632788659361533818279682303019520353018529689957736225994138912497217752834791315155748572424541506959508295331168617278558890750983817546374649393192550604009277016711390098488240128583616035637076601047101819429555961989467678374494482553797747268471040475346462080466842590694912933136770289891521047521620569660240580381501935112533824300355876402474964732639141992726042699227967823547816360093417216412199245863150302861829745557067498385054945885869269956909272107975093029553211653449872027559602364806654991198818347977535663698074265425278625518184175746728909777727938000816470600161452491921732172147723501414419735685481613611573525521334757418494684385233239073941433345477624168625189835694855620992192221842725502542568876717904946016534668049886272327917860857843838279679766814541009538837863609506800642251252051173929848960841284886269456042419652850222106611863067442786220391949450471237137869609563643719172874677646575739624138908658326459958133904780275900994657640789512694683983525957098258226205224894077267194782684826014769909026401363944374553050682034962524517493996514314298091906592509372216964615157098583874105978859597729754989301617539284681382686838689427741559918559252459539594310499725246808459872736446958486538367362226260991246080512438843904512441365497627807977156914359977001296160894416948685558484063534220722258284886481584560285060168427394522674676788952521385225499546667278239864565961163548862305774564980355936345681743241125150760694794510965960940252288797108931456691368672287489405601015033086179286809208747609178249385890097149096759852613655497818931297848216829989487226588048575640142704775551323796414515237462343645428584447952658678210511413547357395231134271661021359695362314429524849371871101457654035902799344037420073105785390621983874478084784896833214457138687519435064302184531910484810053706146806749192781911979399520614196634287544406437451237181921799983910159195618146751426912397489409071864942319615679452080951465502252316038819301420937621378559566389377870830390697920773467221825625996615014215030680384477345492026054146659252014974428507325186660021324340881907104863317346496514539057962685610055081066587969981635747363840525714591028970641401109712062804390397595156771577004203378699360072305587631763594218731251471205329281918261861258673215791984148488291644706095752706957220917567116722910981690915280173506712748583222871835209353965725121083579151369882091444210067510334671103141267111369908658516398315019701651511685171437657618351556508849099898599823873455283316355076479185358932261854896321329330898570642046752590709154814165498594616371802709819943099244889575712828905923233260972997120844335732654893823911932597463667305836041428138830320382490375898524374417029132765618093773444030707469211201913020330380197621101100449293215160842444859637669838952286847831235526582131449576857262433441893039686426243410773226978028073189154411010446823252716201052652272111660396665573092547110557853763466820653109896526918620564769312570586356620185581007293606598764861179104533488503461136576867532494416680396265797877185560845529654126654085306143444318586769751456614068007002378776591344017127494704205622305389945613140711270004078547332699390814546646458807972708266830634328587856983052358089330657574067954571637752542021149557615814002501262285941302164715509792592309907965473761255176567513575178296664547791745011299614890304639947132962107340437518957359614589019389713111790429782856475032031986915140287080859904801094121472213179476477726224142548545403321571853061422881375850430633217518297986622371721591607716692547487389866549494501146540628433663937900397692656721463853067360965712091807638327166416274888800786925602902284721040317211860820419000422966171196377921337575114959501566049631862947265473642523081770367515906735023507283540567040386743513622224771589150495309844489333096340878076932599397805419341447377441842631298608099888687413260472";

const PI_DIGITS = PI_STRING.split('').map(Number);

const COLORS = [
  '#4bbfc8','#43b494','#56a845','#92a830','#f5a020',
  '#e85020','#e81848','#f0709c','#a890d0','#5090cc'
];

// Precompute transition counts for each (from, to) pair
const transCount = Array.from({length:10}, () => new Array(10).fill(0));
for (let i = 0; i < PI_DIGITS.length - 1; i++) {
  transCount[PI_DIGITS[i]][PI_DIGITS[i+1]]++;
}
let minTC = Infinity, maxTC = 0;
for (let d1 = 0; d1 < 10; d1++) {
  for (let d2 = 0; d2 < 10; d2++) {
    const c = transCount[d1][d2];
    if (c < minTC) minTC = c;
    if (c > maxTC) maxTC = c;
  }
}
const tcRange = maxTC - minTC || 1;

// ─── STATE ───────────────────────────────────────────────────────────────────
const COLS = 50;
const ROWS = Math.ceil(PI_DIGITS.length / COLS); // 100

let currentView = 'grid';
let hoverD   = -1;   // digit being hovered (-1 = none)
let hoverIdx = -1;   // grid index being hovered
let rafHandle = null;

let cellW = 0, cellH = 0;            // grid cell sizes (CSS px)
let webSize = 0, webR = 0;           // web canvas size & circle radius
let webNodes = [];                    // [{x,y}] for digits 0-9
let dpr = 1;

const canvas  = document.getElementById('artCanvas');
const ctx     = canvas.getContext('2d');
const outer   = document.getElementById('canvasOuter');
const tooltip = document.getElementById('tooltip');

// ─── GRID ─────────────────────────────────────────────────────────────────────
function initGrid() {
  dpr   = window.devicePixelRatio || 1;
  const w = outer.clientWidth || 900;
  cellW = w / COLS;
  cellH = cellW;
  const h = ROWS * cellH;

  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width        = Math.round(w * dpr);
  canvas.height       = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const fontSize = cellH * 0.82;
  ctx.font         = `900 ${Math.round(fontSize)}px -apple-system, 'Helvetica Neue', Arial, sans-serif`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  for (let i = 0; i < PI_DIGITS.length; i++) {
    const d   = PI_DIGITS[i];
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x   = (col + 0.5) * cellW;
    const y   = (row + 0.5) * cellH;

    ctx.globalAlpha = (hoverD === -1 || d === hoverD) ? 1.0 : 0.07;
    ctx.fillStyle   = COLORS[d];
    ctx.fillText(d, x, y);
  }
  ctx.globalAlpha = 1;
}

// ─── WEB ──────────────────────────────────────────────────────────────────────
function initWeb() {
  dpr     = window.devicePixelRatio || 1;
  webSize = Math.min(outer.clientWidth || 700, 700);
  webR    = webSize * 0.38;

  const cx = webSize / 2, cy = webSize / 2;
  webNodes = Array.from({length:10}, (_, i) => {
    const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
    return { x: cx + webR * Math.cos(angle), y: cy + webR * Math.sin(angle) };
  });

  canvas.style.width  = webSize + 'px';
  canvas.style.height = webSize + 'px';
  canvas.width        = Math.round(webSize * dpr);
  canvas.height       = Math.round(webSize * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawWeb() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, webSize, webSize);

  // Lines — one per unique (from→to) pair, width/alpha scaled by transition frequency
  for (let d1 = 0; d1 < 10; d1++) {
    for (let d2 = 0; d2 < 10; d2++) {
      const count = transCount[d1][d2];
      if (count === 0) continue;
      const t = (count - minTC) / tcRange;  // 0 = rarest, 1 = most common
      const highlighted = hoverD === -1 || d1 === hoverD;
      ctx.strokeStyle = COLORS[d1];
      if (hoverD === -1) {
        ctx.lineWidth   = 0.8 + t * 5.5;
        ctx.globalAlpha = 0.18 + t * 0.55;
      } else if (highlighted) {
        ctx.lineWidth   = 1.5 + t * 7.5;
        ctx.globalAlpha = 0.35 + t * 0.60;
      } else {
        ctx.lineWidth   = 0.3;
        ctx.globalAlpha = 0.025;
      }
      ctx.beginPath();
      ctx.moveTo(webNodes[d1].x, webNodes[d1].y);
      ctx.lineTo(webNodes[d2].x, webNodes[d2].y);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // Nodes
  const nodeR = webSize * 0.038;
  for (let i = 0; i < 10; i++) {
    const n        = webNodes[i];
    const isActive = hoverD === -1 || i === hoverD;

    // Glow ring
    ctx.save();
    ctx.shadowColor = COLORS[i];
    ctx.shadowBlur  = isActive ? 22 : 6;
    ctx.globalAlpha = isActive ? 1.0 : 0.3;
    ctx.fillStyle   = COLORS[i];
    ctx.beginPath();
    ctx.arc(n.x, n.y, nodeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Digit label
    ctx.globalAlpha    = isActive ? 1.0 : 0.3;
    ctx.fillStyle      = '#ffffff';
    ctx.font           = `bold ${Math.round(nodeR * 1.05)}px -apple-system, sans-serif`;
    ctx.textAlign      = 'center';
    ctx.textBaseline   = 'middle';
    ctx.fillText(i, n.x, n.y);
    ctx.globalAlpha    = 1;
  }
}

// ─── VIEW SWITCH ──────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  hoverD      = -1;
  hoverIdx    = -1;
  tooltip.style.display = 'none';

  document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
  document.getElementById('btnWeb').classList.toggle('active',  view === 'web');

  outer.className = 'canvas-outer ' + (view === 'grid' ? 'grid-mode' : 'web-mode');

  document.getElementById('caption').textContent = view === 'grid'
    ? '5,000 digits of π · hover a digit to highlight all its occurrences'
    : '5,000 consecutive digit transitions · each line goes from one digit to the next, coloured by starting digit · hover a numbered node to highlight its outgoing paths';

  buildLegend(view);

  if (view === 'grid') { initGrid(); drawGrid(); }
  else                 { initWeb();  drawWeb();  }
}

// ─── LEGEND ───────────────────────────────────────────────────────────────────
function buildLegend(view) {
  const leg = document.getElementById('legend');
  leg.innerHTML = Array.from({length:10}, (_, i) => `
    <div class="legend-item" onmouseenter="pinHover(${i})" onmouseleave="clearHover()">
      <div class="legend-swatch" style="background:${COLORS[i]}"></div>
      <span>${i}</span>
    </div>
  `).join('');
}

function pinHover(d) {
  if (hoverD === d) return;
  hoverD = d;
  scheduleRedraw();
}

function clearHover() {
  if (hoverD === -1) return;
  hoverD = -1;
  scheduleRedraw();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function scheduleRedraw() {
  if (rafHandle) cancelAnimationFrame(rafHandle);
  rafHandle = requestAnimationFrame(() => {
    currentView === 'grid' ? drawGrid() : drawWeb();
    rafHandle = null;
  });
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;

  if (currentView === 'grid') {
    const col = Math.floor(mx / cellW);
    const row = Math.floor(my / cellH);
    const idx = row * COLS + col;

    if (idx >= 0 && idx < PI_DIGITS.length && col >= 0 && col < COLS) {
      const d = PI_DIGITS[idx];
      hoverIdx = idx;
      tooltip.innerHTML     = `<strong>Digit:</strong> ${d}&nbsp;&nbsp;<strong>nTH position:</strong> ${idx + 1}`;
      tooltip.style.display = 'block';
      tooltip.style.left    = (e.clientX + 14) + 'px';
      tooltip.style.top     = (e.clientY - 8)  + 'px';
      if (d !== hoverD) { hoverD = d; scheduleRedraw(); }
    } else {
      tooltip.style.display = 'none';
      if (hoverD !== -1) { hoverD = -1; scheduleRedraw(); }
    }

  } else {
    // Web: check proximity to any node
    const nodeHitR = webSize * 0.055;
    let found = -1;
    for (let i = 0; i < 10; i++) {
      const n  = webNodes[i];
      const dx = mx - n.x, dy = my - n.y;
      if (dx*dx + dy*dy < nodeHitR * nodeHitR) { found = i; break; }
    }
    if (found !== -1) {
      const count = transCount[found].reduce((s, c) => s + c, 0);
      tooltip.innerHTML     = `<strong>Digit ${found}</strong>&nbsp;&nbsp;${count} outgoing transitions`;
      tooltip.style.display = 'block';
      tooltip.style.left    = (e.clientX + 14) + 'px';
      tooltip.style.top     = (e.clientY - 8)  + 'px';
    } else {
      tooltip.style.display = 'none';
    }
    if (found !== hoverD) { hoverD = found; scheduleRedraw(); }
  }
});

canvas.addEventListener('mouseleave', () => {
  hoverD    = -1;
  hoverIdx  = -1;
  tooltip.style.display = 'none';
  scheduleRedraw();
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
const ro = new ResizeObserver(() => {
  hoverD = -1;
  if (currentView === 'grid') { initGrid(); drawGrid(); }
  else                         { initWeb();  drawWeb();  }
});
ro.observe(outer);

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => switchView('grid'));
</script>
</body>
</html>
